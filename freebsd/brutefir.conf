## BruteFIR minimal configuration — FreeBSD / OSS
##
## Stereo 2-channel passthrough with identity (dirac pulse) filters.
## Replace the "dirac pulse" coefficient with a real FIR file to apply
## room correction or crossfeed.
##
## Run from the build directory (contains oss.bfio, cli.bflogic, etc.):
##
##   cd /path/to/brutefir/build_oss
##   ./brutefir ../freebsd/brutefir.conf
##
## For the loopback scenario (BruteFIR between a player and the soundcard):
##   - change the input device to "/dev/dsp.loop" (virtual_oss loopback)
##   - keep the output device as "/dev/dsp0" (real soundcard)
##   See FreeBSD.md § "Virtual loop device" for virtual_oss setup.

sampling_rate: 44100;
filter_length: 65536;

## -----------------------------------------------------------------------
## Coefficients
## "dirac pulse" is a built-in keyword: identity filter, no coloration.
## Replace with:  filename: "/path/to/left.wav";  to load a real FIR.
## -----------------------------------------------------------------------
coeff "L" {
    filename: "dirac pulse";
};
coeff "R" {
    filename: "dirac pulse";
};

## -----------------------------------------------------------------------
## Input — read from OSS device
##
## For a passthrough test, use the same device for input and output.
## OSS opens the device in full-duplex (O_RDWR) automatically when the
## same path appears in both input and output blocks.
##
## For the loopback scenario, change to:
##   device: "/dev/dsp.loop";
## -----------------------------------------------------------------------
input 0, 1 {
    device: "oss" {
        device: "/dev/dsp0";
    };
    sample: "S32_LE";
    channels: 2;
};

## -----------------------------------------------------------------------
## Output — write to OSS device
## -----------------------------------------------------------------------
output 0, 1 {
    device: "oss" {
        device: "/dev/dsp0";
    };
    sample: "S32_LE";
    dither: false;
    channels: 2;
};

## -----------------------------------------------------------------------
## Filters — one per channel, wired input → coeff → output
## -----------------------------------------------------------------------
filter "L_pass" {
    from_inputs: 0;
    to_outputs: 0;
    coeff: "L";
};

filter "R_pass" {
    from_inputs: 1;
    to_outputs: 1;
    coeff: "R";
};
