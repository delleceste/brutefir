## BruteFIR stereo passthrough — no filtering, no room correction.
##
## Install as ~/.config/BruteFIR/brutefir.conf (or wherever config_file
## points in your brutefir_defaults).  This is the no-op fallback used
## when brutefir is started without an explicit config argument.
##
## Device, sample format, channels, sampling rate, and filter length are
## all inherited from brutefir_defaults — nothing needs repeating here.
## Pass a custom config on the command line to apply actual FIR filters:
##
##   brutefir ~/digital-room-correction/brutefir.conf

coeff "L" { filename: "dirac pulse"; };
coeff "R" { filename: "dirac pulse"; };

input 0, 1 {};

output 0, 1 {};

filter "L" {
    from_inputs: 0;
    to_outputs: 0;
    coeff: "L";
};

filter "R" {
    from_inputs: 1;
    to_outputs: 1;
    coeff: "R";
};
